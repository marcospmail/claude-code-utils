name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v5
        with:
          version: 10.28.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install

      # `pnpm run lint` (ray lint) is skipped in CI: ray enforces an npm
      # package-lock.json there, which is incompatible with this pnpm extension.
      # `ray build` below still type-checks the whole extension.
      - run: pnpm run build
